<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ICE & GREEN - Feed</title>

<link rel="stylesheet" href="css/feed.css">

</head>


<body>


<header>

<h1>
ICE & GREEN
</h1>


<button id="sair">
Sair
</button>


</header>



<main>


<section class="perfil">

<div class="avatar">
<img src="https://i.pravatar.cc/100">
</div>


<div>

<h2>
Usuário
</h2>

<p>
Compartilhando momentos 🚀
</p>

</div>


</section>




<section class="criar-post">


<textarea 
id="textoPost"
placeholder="No que você está pensando?">
</textarea>



<input 
type="file"
id="imagemPost"
accept="image/*">



<button id="publicar">

Publicar

</button>



</section>





<section id="feed">

</section>



</main>


<script src="js/feed.js"></script>


</body>

</html>
