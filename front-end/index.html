<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AKLISTA</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="background">

        <div class="circle circle1"></div>

        <div class="circle circle2"></div>

        <div class="circle circle3"></div>

    </div>

    <main class="container">

        <section class="left">

            <h1>AKLISTA</h1>

            <p class="subtitle">

                Compartilhe momentos, conheça pessoas e faça parte da comunidade.

            </p>

            <div class="features">

                <div class="feature">

                    <span>🌎</span>

                    <p>Conecte-se com pessoas do mundo inteiro.</p>

                </div>

                <div class="feature">

                    <span>📷</span>

                    <p>Publique fotos, vídeos e compartilhe experiências.</p>

                </div>

                <div class="feature">

                    <span>💬</span>

                    <p>Converse com seus amigos em tempo real.</p>

                </div>

            </div>

        </section>

        <section class="right">

            <div class="card">

                <h2>Entrar</h2>

                <p class="text">

                    Entre na sua conta.

                </p>

                <div class="input-group">

                    <label>Email</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Digite seu email">

                </div>

                <div class="input-group">

                    <label>Senha</label>

                    <input
                        type="password"
                        id="senha"
                        placeholder="Digite sua senha">

                </div>

                <button id="btnLogin">

                    Entrar

                </button>

                <p id="mensagemErro"></p>

                <div class="divider">

                    <span></span>

                    <p>ou</p>

                    <span></span>

                </div>

                <button
                    class="cadastro"
                    onclick="window.location.href='cadastro.html'">

                    Criar Conta

                </button>

            </div>

        </section>

    </main>

    <script src="js/login.js"></script>

</body>

</html>
